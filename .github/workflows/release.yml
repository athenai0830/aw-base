name: Package Theme on Release

on:
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create aw-base.zip
        run: |
          mkdir -p /tmp/aw-base
          rsync -a --exclude='.git' --exclude='.github' . /tmp/aw-base/
          cd /tmp
          zip -r aw-base.zip aw-base/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/aw-base.zip
